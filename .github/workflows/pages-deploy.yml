name: Deploy docs to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::Cloudflare Pages deploy skipped because CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN is not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.cloudflare.outputs.ready == 'true'

      - uses: actions/setup-node@v5
        if: steps.cloudflare.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.ready == 'true'
        run: npm ci

      - name: Build docs
        if: steps.cloudflare.outputs.ready == 'true'
        run: npm run docs:build

      - name: Deploy docs
        if: steps.cloudflare.outputs.ready == 'true'
        run: |
          npx wrangler@4 pages deploy docs/.vitepress/dist \
            --project-name oh-my-experience \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "$(git log -1 --pretty=%s)"
