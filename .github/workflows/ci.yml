name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run check
      - run: npm test
      - name: Docs build
        run: npm run docs:build
      - name: Recall eval gate
        run: node bin/ome.js eval recall --suite tests/fixtures/eval/core.json --limit 8 --threshold 40 --min-pass-rate 1 --min-recall 1 --min-precision 1 --max-over-recall 0 --json
      - name: Hook eval gate
        run: |
          DATA_DIR="$(node bin/ome.js eval recall --suite tests/fixtures/eval/core.json --limit 8 --threshold 40 --min-pass-rate 1 --min-recall 1 --min-precision 1 --max-over-recall 0 --json | node -e "const fs = require('fs'); const json = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(json.fixtureDataDir);")"
          printf '%s' '{"prompt":"Fix a frontend UI bug and validate the result in a real browser.","session_id":"ci-codex","turn_id":"1","cwd":"'"$PWD"'"}' \
            | node bin/ome.js hook run --data-dir "$DATA_DIR" --json \
            | tee /tmp/ome-codex-hook.json \
            | grep browser-validation
          printf '%s' '{"hook_event_name":"UserPromptSubmit","prompt":"Fix a frontend UI bug and validate the result in a real browser.","transcript_path":"/tmp/ome-claude-transcript.jsonl","cwd":"'"$PWD"'"}' \
            | node bin/ome.js hook run --data-dir "$DATA_DIR" --json \
            | tee /tmp/ome-claude-hook.json \
            | grep browser-validation
      - run: npm run build:binary:bun
      - name: Bun binary smoke
        run: |
          DATA_DIR="$(mktemp -d)"
          CONFIG_HOME="$(mktemp -d)"
          OH_MY_EXPERIENCE_CONFIG_HOME="$CONFIG_HOME" ./build/ome init --data-dir "$DATA_DIR" --json
          OH_MY_EXPERIENCE_CONFIG_HOME="$CONFIG_HOME" ./build/ome doctor --data-dir "$DATA_DIR" --json
      - run: npm pack --dry-run
      - name: Tarball install smoke
        run: |
          TARBALL="$(npm pack --silent)"
          SMOKE_DIR="$(mktemp -d)"
          DATA_DIR="$(mktemp -d)"
          CONFIG_HOME="$(mktemp -d)"
          npm install "$PWD/$TARBALL" --prefix "$SMOKE_DIR"
          OH_MY_EXPERIENCE_CONFIG_HOME="$CONFIG_HOME" npx --prefix "$SMOKE_DIR" oh-my-experience init --data-dir "$DATA_DIR" --json
          OH_MY_EXPERIENCE_CONFIG_HOME="$CONFIG_HOME" npx --prefix "$SMOKE_DIR" ome doctor --data-dir "$DATA_DIR" --json
          OH_MY_EXPERIENCE_CONFIG_HOME="$CONFIG_HOME" npx --prefix "$SMOKE_DIR" ome config preview privacy.saveRawPrompt true --data-dir "$DATA_DIR" --json
